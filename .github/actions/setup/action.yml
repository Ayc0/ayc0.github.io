name: Setup
description: Checkout, install pnpm, Node.js, and dependencies

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install pnpm
      uses: pnpm/action-setup@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: "package.json"
        cache: "pnpm"

    - name: Install
      run: pnpm install
      shell: bash
